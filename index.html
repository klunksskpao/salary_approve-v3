<script>
    // ---------------------------------------------------
    // ฟังก์ชันสร้างตัวเลือกวันที่ (วัน/เดือน/ปี พ.ศ.)
    // ---------------------------------------------------
    function generateDateOptions() {
        const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let dayOptions = '<option value="">วัน</option>';
        for (let i = 1; i <= 31; i++) {
            let val = i < 10 ? '0' + i : i;
            dayOptions += `<option value="${val}">${i}</option>`;
        }

        let monthOptions = '<option value="">เดือน</option>';
        thaiMonths.forEach((m, index) => {
            let val = (index + 1) < 10 ? '0' + (index + 1) : (index + 1);
            monthOptions += `<option value="${val}">${m}</option>`;
        });

        const currentYear = new Date().getFullYear();
        const currentYearTH = currentYear + 543;
        
        let yearOptions = '<option value="">ปี พ.ศ.</option>';
        // แสดงปีตั้งแต่ +10 ปีข้างหน้า ย้อนหลังไป 60 ปี
        for (let y = currentYearTH + 10; y >= currentYearTH - 60; y--) {
            yearOptions += `<option value="${y}">${y}</option>`;
        }

        // นำตัวเลือกไปใส่ใน Dropdown ทั้ง 3 ชุด
        ['cert_join', 'contract', 'contract_end'].forEach(prefix => {
            document.getElementById(prefix + '_day').innerHTML = dayOptions;
            document.getElementById(prefix + '_month').innerHTML = monthOptions;
            document.getElementById(prefix + '_year').innerHTML = yearOptions;
        });

        // จัดการ Dropdown ปีสำหรับ สลิปเงินเดือน (ส่งค่าเข้าเซิร์ฟเวอร์เป็น ค.ศ. แต่โชว์ พ.ศ.)
        let payslipYearHTML = "";
        for(let i=0; i<=3; i++) { 
            let y = currentYear - i;
            payslipYearHTML += `<option value="${y}">${y + 543}</option>`;
        }
        document.getElementById('req_year').innerHTML = payslipYearHTML;
    }


    // ฟังก์ชันจัดการเปิด/ปิด Section และจัดการระบบ Required แบบครอบคลุม
    function toggleSections() {
        const reqCert = document.getElementById('req_cert').checked;
        const reqPayslip = document.getElementById('req_payslip').checked;

        const certSection = document.getElementById('cert_section');
        certSection.classList.toggle('hidden', !reqCert);
        
        // เพิ่ม select เข้าไปใน querySelector เพื่อรองรับ dropdown วันที่
        const certInputs = certSection.querySelectorAll('input:not([type="hidden"]):not([readonly]), select');
        certInputs.forEach(input => { input.required = reqCert; });

        const payslipSection = document.getElementById('payslip_section');
        payslipSection.classList.toggle('hidden', !reqPayslip);
        
        const payslipInputs = payslipSection.querySelectorAll('input:not([type="hidden"]), select');
        payslipInputs.forEach(input => { input.required = reqPayslip; });

        if (reqCert) {
            toggleEmpType();
            toggleOtherPurpose();
            setTimeout(resizeCanvas, 100);
        } else {
            // ปลด Required ออกเมื่อติ๊กออก
            document.querySelectorAll('#contract_section input, #contract_section select, #other_purpose_div input').forEach(f => f.required = false);
        }
    }

    function toggleEmpType() {
        const reqCert = document.getElementById('req_cert').checked;
        const empTypeRadio = document.querySelector('input[name="emp_type"]:checked');
        const contractSection = document.getElementById('contract_section');
        // เพิ่ม select
        const contractInputs = contractSection.querySelectorAll('input:not([type="hidden"]), select');

        if (reqCert && empTypeRadio && empTypeRadio.value === 'B') {
            contractSection.classList.remove('hidden');
            contractInputs.forEach(input => input.required = true);
        } else {
            contractSection.classList.add('hidden');
            contractInputs.forEach(input => input.required = false);
        }
    }

    function toggleOtherPurpose() {
        const reqCert = document.getElementById('req_cert').checked;
        const purpose = document.getElementById('purpose').value;
        const otherDiv = document.getElementById('other_purpose_div');
        const otherInput = otherDiv.querySelector('input');

        if (reqCert && purpose === 'อื่นๆ') {
            otherDiv.classList.remove('hidden');
            otherInput.required = true;
        } else {
            otherDiv.classList.add('hidden');
            otherInput.required = false;
        }
    }

    // ฟังก์ชันดึงข้อมูล JSON หน่วยงาน
    async function loadDepartments() {
        const selectDept = document.getElementById('main_department');
        try {
            const apiUrl = 'https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrTqlsvX9EGa0e5zxv6qWyu4_nMD16SYo3jBG9Rg1Xfk9o5DAaB_tXw8IYuedpEifzaPL_83JefSI2EiSIcQVtB85zkDz27T3UrMViZ1G6VOx9CYXBz6dExz5M1dpMBbxa4O2U9Ni_dsd_Kfbpi8ohe9cJxO4k1nRfAwKsU6YSVAFC1goHTkfE-Nm-dkjwpqO4kt2KkNiNpgXaSYvmRwSjKm1YjKp4JPOBWqRBx_X0m0MiA3V5Y1WpZAXhlEmo87Ei39vqeGVNNT3tfwJFjekYEqF5oSVQ&lib=MxAy61XuoMhvZz6-dtelljFG8jR3uC7Sx'; 
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            let deptHTML = '<option value="">-- กรุณาเลือกสังกัด --</option>';

            if (data && data.options) {
                data.options.forEach(item => {
                    let value = typeof item === 'object' ? (item.value || item.id || item.name) : item;
                    let text = typeof item === 'object' ? (item.text || item.name || item.value) : item;
                    deptHTML += `<option value="${value}">${text}</option>`;
                });
            } else {
                deptHTML += '<option value="">ไม่พบข้อมูลสังกัด</option>';
            }
            selectDept.innerHTML = deptHTML;
        } catch (error) {
            console.error('Error fetching departments:', error);
            selectDept.innerHTML = '<option value="">เกิดข้อผิดพลาดในการโหลดข้อมูล</option>';
        }
    }

    window.onload = function() {
        loadDepartments();
        generateDateOptions(); // สร้างตัวเลือกวันที่ทันทีที่เปิดเว็บ
        toggleSections();
    };

    // ระบบ Canvas วาดลายเซ็น 
    const canvas = document.getElementById('signatureCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let hasSignature = false; 

    function resizeCanvas() {
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        if(canvas.width > 0 && canvas.height > 0) {
            tempCtx.drawImage(canvas, 0, 0);
        }

        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';

        if(tempCanvas.width > 0 && tempCanvas.height > 0) {
            ctx.drawImage(tempCanvas, 0, 0);
        }
    }

    window.addEventListener('resize', () => {
        if(!document.getElementById('cert_section').classList.contains('hidden')) {
            resizeCanvas();
        }
    });

    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX;
        let clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        return { 
            x: (clientX - rect.left) * (canvas.width / rect.width), 
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    const startDrawing = (e) => {
        isDrawing = true;
        const pos = getPointerPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault(); 
    };

    const draw = (e) => {
        if (!isDrawing) return;
        const pos = getPointerPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        hasSignature = true; 
        e.preventDefault();
    };

    const stopDrawing = () => {
        isDrawing = false;
        ctx.beginPath();
    };

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchcancel', stopDrawing);

    function clearSignature() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        hasSignature = false; 
    }
    
    function saveSignature() { 
        document.getElementById('signature_data').value = canvas.toDataURL("image/png"); 
    }

    // ฟังก์ชันคำนวณรายรับอัตโนมัติ
    function calculateTotal() {
        let salary = parseFloat(document.getElementById('salary').value) || 0;
        let posAllowance = parseFloat(document.getElementById('position_allowance').value) || 0;
        let monthlyRem = parseFloat(document.getElementById('monthly_remuneration').value) || 0;
        let livingAllowance = parseFloat(document.getElementById('living_allowance').value) || 0;
        let total = salary + posAllowance + monthlyRem + livingAllowance;
        document.getElementById('total_income').value = total.toFixed(2);
    }

    // ตรวจสอบและประมวลผลวันที่ก่อนส่ง
    function validateBeforeSubmit() {
        const reqCert = document.getElementById('req_cert').checked;
        const reqPayslip = document.getElementById('req_payslip').checked;
        
        if (!reqCert && !reqPayslip) {
            alert("กรุณาเลือกเอกสารที่ต้องการขออย่างน้อย 1 อย่างค่ะ");
            return false;
        }

        // =====================================
        // แปลง Dropdown วันที่ (พ.ศ.) ให้เป็นรูปแบบ YYYY-MM-DD (ค.ศ.) เพื่อส่งเข้าฐานข้อมูล
        // =====================================
        if (reqCert) {
            // 1. ตรวจสอบวันที่บรรจุ
            const jDay = document.getElementById('cert_join_day').value;
            const jMonth = document.getElementById('cert_join_month').value;
            const jYear = document.getElementById('cert_join_year').value;
            if (!jDay || !jMonth || !jYear) {
                alert("กรุณาระบุวันที่บรรจุให้ครบถ้วนค่ะ");
                return false;
            }
            // หักลบ 543 ให้กลายเป็น ค.ศ.
            document.getElementById('cert_join_date').value = (parseInt(jYear) - 543) + "-" + jMonth + "-" + jDay;

            // 2. ตรวจสอบวันที่สำหรับพนักงานจ้าง (กรณีเลือก Type B)
            const empTypeRadio = document.querySelector('input[name="emp_type"]:checked');
            if (empTypeRadio && empTypeRadio.value === 'B') {
                const cDay = document.getElementById('contract_day').value;
                const cMonth = document.getElementById('contract_month').value;
                const cYear = document.getElementById('contract_year').value;
                if (!cDay || !cMonth || !cYear) {
                    alert("กรุณาระบุ 'สัญญาจ้างลงวันที่' ให้ครบถ้วนค่ะ");
                    return false;
                }
                document.getElementById('contract_date').value = (parseInt(cYear) - 543) + "-" + cMonth + "-" + cDay;

                const ceDay = document.getElementById('contract_end_day').value;
                const ceMonth = document.getElementById('contract_end_month').value;
                const ceYear = document.getElementById('contract_end_year').value;
                if (!ceDay || !ceMonth || !ceYear) {
                    alert("กรุณาระบุ 'สัญญาจ้างสิ้นสุดวันที่' ให้ครบถ้วนค่ะ");
                    return false;
                }
                document.getElementById('contract_end_date').value = (parseInt(ceYear) - 543) + "-" + ceMonth + "-" + ceDay;
            }

            // ตรวจสอบลายเซ็น
            if (!hasSignature) {
                alert("กรุณาวาดลายเซ็นผู้ขอ ในกรอบที่กำหนดก่อนส่งคำขอค่ะ");
                return false; 
            }
            saveSignature(); 
        }

        // คัดลอกข้อมูลลง Hidden Fields
        const title = document.getElementById('main_title').value;
        const fullname = document.getElementById('main_fullname').value;
        const idCard = document.getElementById('main_id_card').value;
        const position = document.getElementById('main_position').value;
        const dept = document.getElementById('main_department').value;

        document.getElementById('cert_title').value = title;
        document.getElementById('cert_fullname').value = fullname;
        document.getElementById('cert_id_card').value = idCard;
        document.getElementById('cert_position').value = position;
        document.getElementById('cert_department').value = dept;

        document.getElementById('slip_title').value = title;
        document.getElementById('slip_fullname').value = fullname;
        document.getElementById('slip_id_card').value = idCard;
        document.getElementById('slip_position').value = position;
        document.getElementById('slip_department').value = dept;
        
        return true; 
    }
</script>
